# This is a python setting of parameters for the board.  The following
# parameters may be set (other keys are silently ignored).  Defaults are shown
# in brackets
# - cc ('cc')
# - ld (same value as for cc)
# - cflags ([])
# - ldflags ([])
# - cc_define_pattern ('-D{0}')
# - cc_incdir_pattern ('-I{0}')
# - cc_input_pattern ('{0}')
# - cc_output_pattern ('-o {0}')
# - ld_input_pattern ('{0}')
# - ld_output_pattern ('-o {0}')
# - user_libs ([])
# - dummy_libs ([])
# - cpu_mhz (1)
# - warmup_heat (1)

# Get toolchain and MARCH from environment variables (set by march_config.sh or command line)
import os

# Compiler and tools (read from environment, default to standard GCC)
cc = os.environ.get('TC_CC', 'riscv64-unknown-elf-gcc')
ld = os.environ.get('TC_CC', 'riscv64-unknown-elf-gcc')
march_std = os.environ.get('MARCH_STD', 'rv32im_zicsr')
march_comp = os.environ.get('MARCH_COMP', 'rv32imc_zicsr')

# Select architecture based on instruction mode (from environment variable)
inst_mode = os.environ.get('INST_MODE', 'STD_MODE')
if inst_mode == 'COMP_MODE':
    march = march_comp
else:
    march = march_std

# Optimization level (read from environment, default to -O3)
tc_opt = os.environ.get('TC_OPT', '-O3')

# ABI (read from environment, default to ilp32).
mabi = os.environ.get('MABI', 'ilp32')

# Compiler flags
# Note: -c flag tells GCC to compile only (not link)
# MARCH is configured via MARCH_STD/MARCH_COMP environment variables
cflags = ['-c', f'-march={march}', f'-mabi={mabi}', tc_opt, '-std=gnu17', '-g', '-ffunction-sections', '-fdata-sections', '-DHAVE_BOARDSUPPORT_H']
print(f"Using MARCH: {march} for INST_MODE: {inst_mode}")

# Firmware-build axes from march_config.sh (BUILD_LIBC, BUILD_RODATA_LOCATION).
# Defaults preserve legacy behavior when the env vars are not set.
build_libc            = os.environ.get('BUILD_LIBC',            'newlib')
build_rodata_location = os.environ.get('BUILD_RODATA_LOCATION', 'ROM')

# Linker flags - include linker script
# Note: paths are relative to build directory (bd/src/<benchmark>)
ldflags = [f'-march={march}', f'-mabi={mabi}', '-nostartfiles', '-Wl,-gc-sections']

# Libc selection: 'newlib-nano' picks --specs=nano.specs (smaller printf,
# malloc, softfloat). 'newlib' (default) uses the full newlib.
if build_libc == 'newlib-nano':
    ldflags.append('--specs=nano.specs')

# .rodata placement: 'ROM' (default) keeps .rodata next to .text via link.ld
# + crt0.S. 'SRAM' switches to link_rodata_sram.ld + crt0_rodata_sram.S which
# loads .rodata from ROM and copies it to SRAM at boot. (SRAM variant files
# land in phase d; until then BUILD_RODATA_LOCATION=SRAM will fail to link.)
if build_rodata_location == 'SRAM':
    ldflags += ['-T', '../../../config/riscv32/boards/arvern_iverilog/link_rodata_sram.ld', '../../../config/riscv32/boards/arvern_iverilog/startup/crt0_rodata_sram.S']
else:
    ldflags += ['-T', '../../../config/riscv32/boards/arvern_iverilog/link.ld', '../../../config/riscv32/boards/arvern_iverilog/startup/crt0.S']

# User libraries - link math library for benchmarks that need it
user_libs = ['-lm']

# CPU frequency (MHz) - set to 1 MHz for arvern simulation
cpu_mhz = 1

# Warmup heat (number of warm-up iterations before timing)
warmup_heat = 1
